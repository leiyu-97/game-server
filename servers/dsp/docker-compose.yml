services:
  dsp:
    build:
      context: .
    container_name: dsp
    restart: unless-stopped

    ports:
      - "8469:8469/tcp"

    environment:
      STEAM_USER: ${STEAM_USER:-}
      STEAM_PASS: ${STEAM_PASS:-}

    volumes:
      - ./data:/data

    stop_grace_period: 2m
    cpus: 1.7
    mem_limit: 14g
    mem_swappiness: 100
