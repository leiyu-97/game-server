version: '2'
services:
  factorio:
    image: factoriotools/factorio:latest
    ports:
     - 34197:34197/udp
     - 27015:27015/tcp
    volumes:
     - "./data:/factorio"
    environment:
     - PUID=1000
     - PGID=1000
     - PRESET=rich-resources
     - DLC_SPACE_AGE=true
    restart: always
    stop_grace_period: 2m
    cpus: 1.7
    mem_limit: 14g
    mem_swappiness: 100