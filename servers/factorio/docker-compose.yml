version: '3.9'
services:
  factorio:
    image: factoriotools/factorio
    ports:
      - "34197:34197/udp"
      - "27015:27015/tcp"
    volumes:
      - ./data:/factorio
      - ./backups:/backups
      - ./server-settings.json:/server-settings.json
    environment:
      - DLC_SPACE_AGE=false
    restart: always
    stop_grace_period: 2m
    cpus: 1.7
    mem_limit: 14g
    mem_swappiness: 100