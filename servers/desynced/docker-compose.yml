version: "2"

services:
  desynced:
    build: .
    container_name: desynced-server
    restart: always
    environment:
      SERVER_NAME: Endfield
      INSTALL_PATH: /desynced/server
      WORLD_NAME: Talos2
      MAX_PLAYERS: 4
      VISIBILITY: private
      RUN_WITHOUT_PLAYERS: false
      RESOURCE_RICHNESS: 4
      BLIGHT_THRESHOLD: 0.1
      PLATEAU_LEVEL: 0.1
      PEACEFUL_MODE: 2
      SERVER_PASSWORD: ${SERVER_PASSWORD}
    ports:
      - "10099:10099/udp"
    volumes:
      - ./data:/desynced/server
      - ./cache:/root/.wine
    stop_grace_period: 2m
    cpus: 1.7
    mem_limit: 14g
    mem_swappiness: 100