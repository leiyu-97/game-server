version: "2"

services:
  desynced:
    build: .
    container_name: desynced
    restart: always
    environment:
      SERVER_NAME: Endfield
      INSTALL_PATH: /desynced/server
      WORLD_NAME: Talos2
      MAX_PLAYERS: 4
      RESOURCE_INF: true
      SERVER_PASSWORD: ${SERVER_PASSWORD}
    ports:
      - "10099:10099/udp"
    volumes:
      - ./data:/desynced/server
      - ./saves:/saves
      - ./cache:/root/.wine
    stop_grace_period: 2m
    cpus: 1.7
    mem_limit: 14g
    mem_swappiness: 100