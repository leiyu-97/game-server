# Static Mihomo configuration. Nodes come from clash.yaml; project routing lives here.
socks-port: 10808
port: 10809
# Docker forwards host loopback connections through its bridge network, so Mihomo
# must accept LAN-originated connections. docker-compose.yml still publishes the
# ports only on 127.0.0.1, keeping the proxy private to this host.
allow-lan: true
bind-address: '*'
mode: rule
log-level: warning

proxy-providers:
  local-clash:
    type: file
    path: ./clash.yaml

proxy-groups:
  - name: PROJECT_PROXY
    type: select
    use:
      - local-clash

rule-providers:
  steam-game-downloads:
    type: file
    behavior: classical
    format: yaml
    path: ./steam-download-direct.yaml
  project-proxy-whitelist:
    type: file
    behavior: classical
    format: yaml
    path: ./proxy-whitelist.yaml

rules:
  - RULE-SET,steam-game-downloads,DIRECT
  - RULE-SET,project-proxy-whitelist,PROJECT_PROXY
  - MATCH,DIRECT
