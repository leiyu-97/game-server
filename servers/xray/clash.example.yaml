# Copy this file to clash.yaml and replace the example fields with real nodes.
# PROJECT_PROXY uses the first node in the top-level `proxies` list by default.
proxies:
  - name: example-vless-reality
    type: vless
    server: example.com
    port: 443
    uuid: 00000000-0000-0000-0000-000000000000
    network: tcp
    udp: true
    tls: true
    flow: xtls-rprx-vision
    servername: www.example.com
    client-fingerprint: chrome
    reality-opts:
      public-key: REPLACE_ME_PUBLIC_KEY
      short-id: REPLACE_ME_SHORT_ID
